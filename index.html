<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f1729">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="חברותא">
<meta name="format-detection" content="telephone=no">
<meta name="description" content="מצא שותף ללימוד תורה לפי מיקום, נושא ורמה">
<title>ChavrutaConnect — מציאת חברותא</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --bg:#0f1729;
    --bg-soft:#1a2440;
    --card:#fff;
    --ink:#1a2440;
    --ink-soft:#4a5578;
    --ink-muted:#8a93a8;
    --accent:#c9a55c;
    --accent-dark:#a8853f;
    --accent-soft:#f5ebd4;
    --line:#e8ecf3;
    --line-soft:#f0f2f7;
    --green:#10b981;
    --red:#ef4444;
    --blue:#3b82f6;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{
    min-height:100%;
    font-family:'Heebo',-apple-system,sans-serif;
    color:var(--ink);background:#f7f8fb;line-height:1.55;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
    text-size-adjust:100%;-webkit-text-size-adjust:100%;
  }
  body{position:relative}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;min-height:44px}
  .nav-item,.chip,.filter-chip,.back,.send,.menu-arrow,.toggle-switch{min-height:auto}
  input,select,textarea{font-family:inherit;font-size:16px}
  /* prevent iOS auto-zoom on input focus */
  a{color:inherit;text-decoration:none}

  /* APP SHELL */
  #app{
    min-height:100vh;min-height:100dvh;
    display:flex;flex-direction:column;
    max-width:480px;margin:0 auto;background:#fff;
    box-shadow:0 0 60px rgba(15,23,41,.08);
    position:relative;
    padding-bottom:env(safe-area-inset-bottom);
  }
  @media (min-width:520px){
    body{background:linear-gradient(135deg,#0f1729 0%,#2a3760 100%)}
    #app{margin:24px auto;border-radius:24px;overflow:hidden;min-height:calc(100vh - 48px);max-height:calc(100vh - 48px);overflow-y:auto}
  }
  @supports (-webkit-touch-callout:none){
    /* iOS Safari fix for 100vh */
    #app{min-height:-webkit-fill-available}
  }

  /* TOP BAR */
  .topbar{
    position:sticky;top:0;z-index:30;
    background:#fff;
    border-bottom:1px solid var(--line);
    padding:14px 16px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
  }
  .topbar.dark{background:linear-gradient(135deg,#0f1729,#1a2440);color:#fff;border-bottom:none}
  .topbar h1{font-size:17px;font-weight:700}
  .topbar .back{
    width:36px;height:36px;border-radius:10px;
    background:var(--line-soft);
    display:flex;align-items:center;justify-content:center;font-size:18px;
  }
  .topbar.dark .back{background:rgba(255,255,255,.1);color:#fff}

  /* PAGE */
  .page{flex:1;padding:0;animation:slide .25s ease}
  @keyframes slide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* BOTTOM NAV */
  .bottom-nav{
    position:sticky;bottom:0;
    background:#fff;
    border-top:1px solid var(--line);
    display:grid;grid-template-columns:repeat(4,1fr);
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    z-index:20;
  }
  .nav-item{
    display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:8px 4px;border-radius:10px;
    color:var(--ink-muted);font-size:11px;font-weight:500;
    transition:all .15s;
  }
  .nav-item.active{color:var(--accent-dark)}
  .nav-item .nav-icon{font-size:22px;line-height:1}
  .nav-item.active .nav-icon{transform:scale(1.1)}

  /* BUTTONS */
  .btn{
    display:flex;align-items:center;justify-content:center;gap:8px;
    padding:14px 20px;border-radius:12px;font-weight:600;font-size:15px;
    transition:all .15s;width:100%;
  }
  .btn-primary{background:var(--ink);color:var(--accent)}
  .btn-primary:active{transform:scale(.98);background:#000}
  .btn-secondary{background:var(--accent-soft);color:var(--accent-dark)}
  .btn-outline{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
  .btn-ghost{background:transparent;color:var(--ink-soft)}
  .btn-sm{padding:9px 14px;font-size:13px;border-radius:9px}
  .btn-pill{border-radius:999px}

  /* WELCOME PAGE */
  .welcome{
    background:linear-gradient(135deg,#0f1729 0%,#1a2440 50%,#2a3760 100%);
    color:#fff;
    min-height:100vh;min-height:100dvh;
    display:flex;flex-direction:column;
    padding:calc(48px + env(safe-area-inset-top)) 28px calc(32px + env(safe-area-inset-bottom));
    position:relative;overflow:hidden;
  }
  .welcome::before{
    content:"";position:absolute;inset:0;
    background-image:radial-gradient(circle at 20% 20%,rgba(201,165,92,.2),transparent 50%);
    pointer-events:none;
  }
  .welcome-content{flex:1;display:flex;flex-direction:column;justify-content:center;position:relative;z-index:1}
  .welcome .logo{
    width:80px;height:80px;
    background:linear-gradient(135deg,var(--accent),var(--accent-dark));
    border-radius:20px;
    display:flex;align-items:center;justify-content:center;
    font-size:38px;margin-bottom:24px;
    box-shadow:0 12px 40px rgba(201,165,92,.3);
  }
  .welcome h1{font-size:36px;font-weight:800;margin-bottom:12px;line-height:1.1}
  .welcome h1 span{color:var(--accent)}
  .welcome p{color:#cdd5e8;font-size:16px;margin-bottom:32px;font-weight:300;max-width:340px}
  .welcome-features{display:flex;flex-direction:column;gap:14px;margin-bottom:32px}
  .welcome-feat{display:flex;gap:12px;align-items:flex-start}
  .welcome-feat-icon{
    width:36px;height:36px;
    background:rgba(201,165,92,.15);
    color:var(--accent);
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;flex-shrink:0;
  }
  .welcome-feat-text{font-size:14.5px;color:#cdd5e8}
  .welcome-feat-text b{color:#fff;display:block;font-weight:600;font-size:15px}
  .welcome-actions{display:flex;flex-direction:column;gap:10px;position:relative;z-index:1}
  .welcome .btn-primary{background:var(--accent);color:var(--ink);font-weight:700}
  .welcome .btn-outline{background:transparent;border:1.5px solid rgba(255,255,255,.2);color:#fff}

  /* AUTH */
  .auth-page{padding:24px;min-height:calc(100vh - 60px);min-height:calc(100dvh - 60px);display:flex;flex-direction:column}
  .auth-page h2{font-size:24px;font-weight:700;margin-bottom:6px}
  .auth-page .lead{color:var(--ink-soft);margin-bottom:24px;font-size:14.5px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;font-weight:500;color:var(--ink-soft);margin-bottom:6px}
  .field input,.field select,.field textarea{
    width:100%;padding:13px 14px;
    background:#f7f8fb;
    border:1.5px solid var(--line);
    border-radius:11px;
    font-size:16px;color:var(--ink);
    transition:all .15s;
    min-height:48px;
  }
  .field textarea{min-height:auto}
  .field input:focus,.field select:focus,.field textarea:focus{
    outline:none;border-color:var(--accent);background:#fff;
    box-shadow:0 0 0 4px rgba(201,165,92,.1);
  }
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  /* CHIPS */
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
  .chip{
    padding:8px 14px;border-radius:999px;
    background:#f7f8fb;border:1.5px solid var(--line);
    font-size:13.5px;font-weight:500;color:var(--ink-soft);
    transition:all .15s;cursor:pointer;
  }
  .chip:hover{border-color:var(--accent)}
  .chip.active{background:var(--ink);color:var(--accent);border-color:var(--ink)}

  /* ONBOARDING */
  .progress-bar{
    height:4px;background:var(--line-soft);
    margin:0 16px 20px;border-radius:999px;overflow:hidden;
  }
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-dark));transition:width .3s}

  /* HOME */
  .home-hero{
    background:linear-gradient(135deg,#0f1729,#1a2440);
    color:#fff;padding:24px 20px 32px;
    border-radius:0 0 24px 24px;
  }
  .home-greeting{font-size:14px;color:#cdd5e8;margin-bottom:4px}
  .home-name{font-size:24px;font-weight:700;margin-bottom:4px}
  .home-quote{font-size:13px;color:var(--accent);font-style:italic}

  .section{padding:20px 16px}
  .section-title{font-size:17px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
  .section-title a{font-size:13px;color:var(--accent-dark);font-weight:500}

  .path-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:-20px;padding:0 16px;position:relative;z-index:5}
  .path-card{
    background:#fff;border-radius:16px;padding:16px;
    box-shadow:0 8px 24px rgba(15,23,41,.08);
    text-align:center;cursor:pointer;
    transition:transform .15s;
    border:1px solid var(--line-soft);
  }
  .path-card:active{transform:scale(.97)}
  .path-card-icon{
    width:44px;height:44px;
    background:linear-gradient(135deg,var(--accent-soft),#fff);
    border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    font-size:22px;margin:0 auto 10px;
  }
  .path-card h3{font-size:15px;font-weight:700;margin-bottom:3px}
  .path-card p{font-size:12px;color:var(--ink-muted)}

  /* CARDS */
  .card-list{display:flex;flex-direction:column;gap:10px}
  .person-card{
    background:#fff;border:1px solid var(--line-soft);border-radius:14px;
    padding:14px;display:flex;gap:12px;align-items:center;
    transition:all .15s;cursor:pointer;
  }
  .person-card:active{transform:scale(.99);background:#fafbfd}
  .avatar{
    width:52px;height:52px;border-radius:14px;
    background:linear-gradient(135deg,var(--accent),var(--accent-dark));
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:18px;flex-shrink:0;
  }
  .avatar.female{background:linear-gradient(135deg,#a78bfa,#7c3aed)}
  .person-info{flex:1;min-width:0}
  .person-name{font-size:15px;font-weight:700;margin-bottom:2px}
  .person-meta{font-size:12.5px;color:var(--ink-muted);display:flex;flex-wrap:wrap;gap:6px}
  .person-meta span:not(:last-child)::after{content:"·";margin-right:6px;color:var(--line)}
  .person-tags{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
  .tag{
    font-size:11px;padding:2px 8px;border-radius:999px;
    background:var(--accent-soft);color:var(--accent-dark);font-weight:500;
  }
  .tag.green{background:#d1fae5;color:#065f46}
  .tag.blue{background:#dbeafe;color:#1e40af}
  .person-distance{font-size:11px;color:var(--ink-muted);font-weight:500;text-align:left;flex-shrink:0}
  .match-score{
    font-size:11px;font-weight:700;padding:4px 8px;border-radius:8px;
    background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;
    margin-bottom:4px;display:inline-block;
  }

  /* FILTERS */
  .filters{
    display:flex;gap:8px;overflow-x:auto;padding:12px 16px;
    background:#fff;border-bottom:1px solid var(--line-soft);
    scrollbar-width:none;
  }
  .filters::-webkit-scrollbar{display:none}
  .filter-chip{
    padding:7px 13px;border-radius:999px;
    background:#f7f8fb;border:1.5px solid var(--line);
    font-size:13px;font-weight:500;color:var(--ink-soft);
    white-space:nowrap;display:flex;align-items:center;gap:5px;
  }
  .filter-chip.active{background:var(--ink);color:var(--accent);border-color:var(--ink)}

  /* MAP */
  #map{height:340px;border-radius:0;background:#e8ecf3}
  .map-controls{
    background:#fff;padding:14px 16px;
    border-bottom:1px solid var(--line-soft);
  }
  .radius-control{margin-bottom:8px}
  .radius-label{display:flex;justify-content:space-between;font-size:13px;font-weight:500;margin-bottom:6px}
  .radius-label b{color:var(--accent-dark)}
  input[type=range]{
    width:100%;height:6px;background:var(--line);
    border-radius:999px;outline:none;-webkit-appearance:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:22px;height:22px;
    background:var(--accent);border-radius:50%;cursor:pointer;
    box-shadow:0 2px 8px rgba(201,165,92,.4);
  }

  /* PROFILE DETAIL */
  .profile-hero{
    background:linear-gradient(135deg,var(--accent),var(--accent-dark));
    padding:24px 20px;color:#fff;text-align:center;
    border-radius:0 0 24px 24px;
  }
  .profile-avatar{
    width:96px;height:96px;border-radius:24px;
    background:rgba(255,255,255,.2);
    display:flex;align-items:center;justify-content:center;
    font-size:36px;font-weight:800;margin:0 auto 12px;
    backdrop-filter:blur(10px);
  }
  .profile-hero h2{font-size:22px;font-weight:700;margin-bottom:4px}
  .profile-hero .meta{font-size:14px;color:rgba(255,255,255,.85)}
  .profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:0 16px;margin-top:-20px;position:relative;z-index:5}
  .stat-card{background:#fff;border-radius:12px;padding:12px;text-align:center;box-shadow:0 4px 12px rgba(15,23,41,.06)}
  .stat-val{font-size:18px;font-weight:700;color:var(--accent-dark)}
  .stat-lbl{font-size:11px;color:var(--ink-muted);font-weight:500}

  .info-section{padding:20px 16px;border-bottom:1px solid var(--line-soft)}
  .info-label{font-size:11px;font-weight:600;color:var(--ink-muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
  .info-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:14.5px}
  .info-row:last-child{margin-bottom:0}
  .info-row-icon{
    width:32px;height:32px;border-radius:9px;
    background:var(--accent-soft);color:var(--accent-dark);
    display:flex;align-items:center;justify-content:center;font-size:15px;
  }

  /* CHAT */
  .chat-header{
    background:#fff;border-bottom:1px solid var(--line);
    padding:12px 16px;display:flex;align-items:center;gap:12px;
    position:sticky;top:0;z-index:10;
  }
  .chat-list{display:flex;flex-direction:column}
  .chat-item{
    display:flex;gap:12px;align-items:center;
    padding:12px 16px;border-bottom:1px solid var(--line-soft);
    cursor:pointer;transition:all .15s;
  }
  .chat-item:active{background:var(--line-soft)}
  .chat-info{flex:1;min-width:0}
  .chat-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
  .chat-name{font-size:14.5px;font-weight:600}
  .chat-time{font-size:11.5px;color:var(--ink-muted)}
  .chat-preview{font-size:13px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chat-badge{
    background:var(--accent);color:#fff;font-size:10px;
    padding:2px 7px;border-radius:999px;font-weight:700;margin-right:6px;
  }

  .messages{padding:16px;display:flex;flex-direction:column;gap:8px;background:#fafbfd;min-height:calc(100vh - 200px)}
  .msg{
    max-width:75%;padding:10px 14px;border-radius:16px;
    font-size:14.5px;line-height:1.45;
  }
  .msg.them{align-self:flex-start;background:#fff;border:1px solid var(--line);border-bottom-right-radius:4px}
  .msg.me{align-self:flex-end;background:linear-gradient(135deg,var(--ink),#2a3760);color:#fff;border-bottom-left-radius:4px}
  .msg-time{font-size:10.5px;color:var(--ink-muted);margin-top:2px;padding:0 4px}
  .msg.me .msg-time{text-align:left}

  .compose{
    background:#fff;border-top:1px solid var(--line);
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    display:flex;gap:8px;align-items:center;position:sticky;bottom:0;
  }
  .compose input{
    flex:1;padding:11px 14px;background:#f7f8fb;border:1px solid var(--line);
    border-radius:999px;font-size:16px;
  }
  .compose input:focus{outline:none;border-color:var(--accent)}
  .compose .send{
    width:40px;height:40px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent-dark));
    color:#fff;font-size:16px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }

  /* MY PROFILE */
  .my-profile-header{
    background:linear-gradient(135deg,#0f1729,#1a2440);
    color:#fff;padding:32px 20px 24px;text-align:center;
    border-radius:0 0 24px 24px;
  }
  .my-profile-avatar{
    width:88px;height:88px;border-radius:24px;
    background:linear-gradient(135deg,var(--accent),var(--accent-dark));
    display:flex;align-items:center;justify-content:center;
    font-size:34px;font-weight:800;margin:0 auto 12px;
  }
  .my-profile-name{font-size:21px;font-weight:700;margin-bottom:2px}
  .my-profile-email{font-size:13px;color:#cdd5e8}

  .menu{padding:16px}
  .menu-item{
    display:flex;align-items:center;gap:14px;padding:14px;
    background:#fff;border:1px solid var(--line-soft);
    border-radius:12px;margin-bottom:8px;cursor:pointer;
    transition:all .15s;
  }
  .menu-item:active{background:#fafbfd}
  .menu-icon{
    width:38px;height:38px;border-radius:10px;
    background:var(--accent-soft);color:var(--accent-dark);
    display:flex;align-items:center;justify-content:center;font-size:16px;
  }
  .menu-text{flex:1;font-size:14.5px;font-weight:500}
  .menu-arrow{color:var(--ink-muted);font-size:18px}

  /* EMPTY STATE */
  .empty{padding:48px 24px;text-align:center;color:var(--ink-muted)}
  .empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}
  .empty-title{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:4px}
  .empty-text{font-size:13.5px}

  /* TOAST */
  .toast{
    position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:11px 18px;
    border-radius:999px;font-size:14px;font-weight:500;
    box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:100;
    animation:toastIn .3s, toastOut .3s 2.7s forwards;
  }
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,20px)}to{opacity:1;transform:translate(-50%,0)}}
  @keyframes toastOut{to{opacity:0;transform:translate(-50%,20px)}}

  /* MODAL */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(15,23,41,.5);z-index:50;
    display:flex;align-items:flex-end;justify-content:center;
    animation:fadeIn .2s;
  }
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{
    background:#fff;width:100%;max-width:480px;
    border-radius:24px 24px 0 0;
    padding:24px 20px calc(24px + env(safe-area-inset-bottom));
    animation:slideUp .25s;
  }
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
  .modal h3{font-size:18px;font-weight:700;margin-bottom:14px;text-align:center}

  /* LOOKING TOGGLE */
  .looking-card{
    margin:16px;padding:16px;border-radius:16px;
    background:linear-gradient(135deg,#fff,var(--accent-soft));
    border:1.5px solid var(--line);
    display:flex;align-items:center;gap:12px;
    transition:all .25s;
  }
  .looking-card.active{
    background:linear-gradient(135deg,#10b981,#059669);
    border-color:#10b981;color:#fff;
    box-shadow:0 8px 24px rgba(16,185,129,.3);
  }
  .looking-card .icon{
    width:48px;height:48px;border-radius:14px;
    background:rgba(255,255,255,.5);
    display:flex;align-items:center;justify-content:center;font-size:22px;
    flex-shrink:0;
  }
  .looking-card.active .icon{background:rgba(255,255,255,.25)}
  .looking-card.active .icon::after{
    content:"";position:absolute;width:48px;height:48px;border-radius:14px;
    border:2px solid rgba(255,255,255,.6);
    animation:pulse 1.8s infinite;
  }
  @keyframes pulse{0%{transform:scale(1);opacity:1}100%{transform:scale(1.5);opacity:0}}
  .looking-card .info{flex:1;min-width:0}
  .looking-card .title{font-weight:700;font-size:15px;margin-bottom:2px}
  .looking-card .sub{font-size:12.5px;opacity:.85}

        </div>

        <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">ביטול</button>

function confirmMeeting(personId,btn){
  const date = document.getElementById('meet-date').value;
  const time = document.getElementById('meet-time').value;
  const topic = document.getElementById('meet-topic').value.trim() || 'לימוד';
  const fmt = document.querySelector('#meet-format .chip.active').textContent;
  if(!date||!time){alert('נא למלא תאריך ושעה');return}
  state.meetings = state.meetings || [];
  state.meetings.push({personId,date,time,topic,format:fmt});
  const chat = CHATS.find(c=>c.personId===personId);
  if(chat){
    chat.messages.push({from:'me',text:`📅 הזמנה למפגש: ${date} בשעה ${time} · ${topic} (${fmt})`,time:'עכשיו'});
    chat.lastTime = 'עכשיו';
  }
  saveState();
  btn.closest('.modal-overlay').remove();
  toast('✅ המפגש נקבע ונשלחה הודעה');
  render();
}

  wrap.innerHTML = `<div id="inst-dropdown" class="inst-dropdown">
    ${matches.map(i=>{

      return `<div class="inst-option" onclick="pickInstitution('${i.replace(/'/g,"\\'")}')">${highlighted}</div>`;
    }).join('')}

function setFilter(key,val){

function filterMatches(p){
  const f = state.filters;
  if(!p.lookingNow) return false;
  if(state.user.gender && p.gender!==state.user.gender) return false;
  if(f.subject!=='all' && !p.subjects.includes(f.subject)) return false;
  if(f.level!=='all' && p.level!==f.level) return false;
  if(f.format!=='all' && p.format!==f.format && p.format!=='שניהם') return false;
  if(f.lookingType && f.lookingType!=='all' && p.lookingType!==f.lookingType) return false;
  return true;
}

}

  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';

  ta.remove();
}

// Haversine formula — מרחק בק"מ בין שתי נקודות על כדור הארץ
function haversine(lat1,lng1,lat2,lng2){
  const R = 6371; // רדיוס כדור הארץ בק"מ
  const toRad = d => d*Math.PI/180;
  const dLat = toRad(lat2-lat1);
  const dLng = toRad(lng2-lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return Math.round(R * 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)) * 10)/10;
}

function requestLocationThenOpen(){
  if(!navigator.geolocation){
    alert('הדפדפן שלך לא תומך באיתור מיקום');
    return;
  }
  toast('📍 מבקש גישה למיקום...');
  navigator.geolocation.getCurrentPosition(
    (pos)=>{
      state.user.lat = pos.coords.latitude;
      state.user.lng = pos.coords.longitude;
      state.user.locationUpdated = new Date().toISOString();
      // עדכון מרחקים של כולם ביחס למיקום החדש
      PEOPLE.forEach(p=>{
        p.distance = haversine(state.user.lat,state.user.lng,p.lat,p.lng);
      });
      saveState();
      toast(`✅ מיקום עודכן (דיוק: ${Math.round(pos.coords.accuracy)}מ')`);
      showLookingModal();
    },
    (err)=>{
      const msgs = {1:'גישה נדחתה — אפשר במכשיר',2:'מיקום לא זמין',3:'תם הזמן — נסה שוב'};
      alert('שגיאת מיקום: '+(msgs[err.code]||err.message)+'\n\nממשיך עם מיקום ברירת מחדל (ירושלים).');
      state.user.lat = 31.7857;
      state.user.lng = 35.2007;
      saveState();
      showLookingModal();
    },
    {enableHighAccuracy:true,timeout:10000,maximumAge:300000}
  );
}

// FIREBASE — שיתוף משתמשים בזמן אמת בין מכשירים

function getMyId(){
  let id = localStorage.getItem('chavrutaUserId');
  if(!id){
    id = 'u_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
    localStorage.setItem('chavrutaUserId',id);
  }
  return id;
}

async function publishToFirebase(){
  if(!window.FIREBASE_ENABLED) return;
  const u = state.user;
  if(!u.lookingNow){ await unpublishFromFirebase(); return; }
  try{
    const { doc, setDoc, serverTimestamp } = window._fb;
    await setDoc(doc(window._db,'activeUsers',getMyId()),{
      id: getMyId(),
      name: u.name,
      gender: u.gender || 'm',
      age: u.age || 25,
      city: u.city,
      institution: u.institution,
      subjects: u.subjects,
      level: u.level,
      lang: Array.isArray(u.lang)?u.lang.join(', '):u.lang,
      format: u.format,
      availability: Array.isArray(u.availability)?u.availability.join(', '):u.availability,
      bio: u.bio,
      lat: u.lat,
      lng: u.lng,
      lookingNow: true,
      lookingType: u.lookingType,
      updatedAt: serverTimestamp()
    });
    console.log('[Firebase] נרשם בהצלחה');
  }catch(e){ console.error('[Firebase] שגיאה:',e); }
}

async function unpublishFromFirebase(){
  if(!window.FIREBASE_ENABLED) return;
  try{
    const { doc, deleteDoc } = window._fb;
    await deleteDoc(doc(window._db,'activeUsers',getMyId()));
  }catch(e){ console.error(e); }
}

function startListeningForUsers(){
  if(!window.FIREBASE_ENABLED) return;
  const { collection, onSnapshot } = window._fb;
  onSnapshot(collection(window._db,'activeUsers'),(snap)=>{
    const others = [];
    snap.forEach(d=>{
      const data = d.data();
      if(data.id === getMyId()) return; // לא אני
      // חישוב מרחק
      let distance = null;
      if(state.user.lat && data.lat){
        distance = haversine(state.user.lat,state.user.lng,data.lat,data.lng);
      }
      others.push({
        ...data,
        subjects: data.subjects||[],
        distance: distance!==null ? distance : 999,
        match: 70 + Math.floor(Math.random()*25) // אלגוריתם בסיסי
      });
    });
    PEOPLE = others;
    if(state.authenticated && state.onboarded) render();
    console.log(`[Firebase] ${others.length} משתמשים פעילים`);
  });
}

function updateRadius(v){
  state.radius = parseInt(v);
  saveState();
  // Just update the visible label and list without re-rendering map
  document.querySelector('.radius-label b').textContent = v + ' ק״מ';
  const filtered = PEOPLE.filter(p=>p.distance<=state.radius && filterMatches(p));
  const listSection = document.querySelector('.section .card-list');
  if(listSection){
    listSection.innerHTML = filtered.length
      ? filtered.sort((a,b)=>a.distance-b.distance).map(p=>renderPersonCard(p,true)).join('')
      : '';
    document.querySelector('.section-title span').textContent = `${filtered.length} חברותות בטווח`;
  }
  // Update map circle
  if(window._mapCircle){
    window._mapCircle.setRadius(state.radius*1000);
  }
}

let _map;
function initMap(){
  setTimeout(()=>{
    const center = (state.user.lat && state.user.lng)
      ? [state.user.lat,state.user.lng]
      : [31.7857,35.2007]; // ברירת מחדל: ירושלים
    if(_map){_map.remove()}
    _map = L.map('map',{zoomControl:false}).setView(center,11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© OpenStreetMap',maxZoom:18
    }).addTo(_map);
    L.control.zoom({position:'topleft'}).addTo(_map);
    // User marker
    L.marker(center,{
      icon:L.divIcon({html:'<div style="background:linear-gradient(135deg,#c9a55c,#a8853f);width:18px;height:18px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.3)"></div>',className:'',iconSize:[18,18]})
    }).addTo(_map).bindPopup('המיקום שלך');
    // Radius circle
    window._mapCircle = L.circle(center,{radius:state.radius*1000,color:'#c9a55c',fillColor:'#c9a55c',fillOpacity:.1,weight:2}).addTo(_map);
    // People markers
    PEOPLE.forEach(p=>{
      L.marker([p.lat,p.lng],{
        icon:L.divIcon({html:`<div style="background:#1a2440;color:#c9a55c;padding:4px 8px;border-radius:8px;font-size:11px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.25);white-space:nowrap">${p.name.split(' ')[0]}</div>`,className:'',iconSize:[80,24]})
      }).addTo(_map).on('click',()=>openPerson(p.id));
    });
  },50);
}

function toast(msg){
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

// INIT
function bootstrap(){
  render();
  // התחלת האזנה למשתמשים פעילים אחרים
  if(window.FIREBASE_ENABLED){
    startListeningForUsers();
    // אם המשתמש כבר מחפש מהרענון הקודם — פרסם מחדש
    if(state.user.lookingNow && state.authenticated && state.onboarded){
      publishToFirebase();
    }
  }
}

// המתנה לטעינת Firebase SDK (modules טוענים async)
if(document.readyState==='complete') bootstrap();
else window.addEventListener('load',()=>setTimeout(bootstrap,300));
</script>
</body>
</html>
